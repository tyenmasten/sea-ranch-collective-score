<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sea Ranch as Prototype</title>
<style>
@font-face {
  font-family: 'Miniature';
  src: url('Fonts/Miniature-Display.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

@font-face {
  font-family: 'Media77';
  src: url('Fonts/Media77-Regular.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

:root {
  --ink: #1a1a1a;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  height: 100%;
}

body {
  min-height: 100%;
  min-height: 100vh;
  min-height: 100dvh;
  background: #ffffff;
  color: var(--ink);
  display: flex;
  justify-content: center;
}

.poster {
  container-type: inline-size;
  display: flex;
  flex-direction: column;
  width: 100%;
  max-width: 600px;
  height: 100vh;
  height: 100dvh;
  padding: clamp(2.5rem, 6vh, 4rem) clamp(1.25rem, 5vw, 3.5rem);
}

@media (max-width: 600px) {
  .poster {
    padding-left: 24px;
    padding-right: 24px;
  }
}

.poster-title {
  flex: 0 0 auto;
  width: 100%;
  font-family: 'Miniature', serif;
  font-size: min(80px, 14cqw);
  font-weight: normal;
  font-style: normal;
  line-height: 0.9;
  letter-spacing: -0.01em;
  color: var(--ink);
  text-align: center;
  text-transform: uppercase;
}

@media (max-width: 600px) {
  .poster-title {
    font-size: clamp(5vw, 13vw, 80px);
  }
}

.poster-title-line {
  display: inline-block;
  white-space: nowrap;
  max-width: 100%;
}

.poster-middle {
  flex: 1 1 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
}

.poster-enter {
  font-family: 'Media77', sans-serif;
  font-size: 18px;
  font-weight: normal;
  font-style: normal;
  color: var(--ink);
  text-decoration: none;
}

.poster-enter:hover,
.poster-enter:focus {
  color: var(--ink);
  text-decoration: none;
}

.poster-footer {
  flex: 0 0 auto;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: clamp(1.5rem, 6cqw, 3rem);
  width: 100%;
  font-family: 'Miniature', serif;
  font-size: clamp(0.875rem, 2.8cqw, 1rem);
  font-weight: normal;
  font-style: normal;
  color: var(--ink);
  text-align: center;
}
</style>
</head>
<body>
  <main class="poster">
    <h1 class="poster-title"><span class="poster-title-line">THE SEA RANCH</span><br><span class="poster-title-line">AS PROTOTYPE</span></h1>
    <div class="poster-middle">
      <a class="poster-enter" href="lexicon-builder.html">Enter</a>
    </div>
    <footer class="poster-footer" aria-label="Themes">
      <span>Form.</span>
      <span>Culture.</span>
      <span>Context.</span>
    </footer>
  </main>
</body>
</html>
